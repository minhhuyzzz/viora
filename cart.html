<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giỏ Hàng — VIORA LUXURY</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="assets/libs/bootstrap.min.css"/>
  <link rel="stylesheet" href="assets/libs/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="stylesheet" href="assets/css/cart.css">
  <style>
      /* Đẩy nội dung xuống tránh bị Header đè */
      .header-spacing { height: 90px; }
      
      /* Cấu trúc ảnh an toàn không bị vỡ HTML */
      .cart-item-img-container {
          width: 90px; aspect-ratio: 3/4; background: #f9f9f9;
          border-radius: 4px; overflow: hidden; flex-shrink: 0; position: relative;
          text-decoration: none;
      }
      .cart-item-img-container img { width: 100%; height: 100%; object-fit: cover; }
      
      /* Chữ cái dự phòng khi ảnh bị xóa/lỗi */
      .img-fallback {
          width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
          background: #f5f5f5; color: #ccc; font-size: 2rem; font-family: var(--font-display); font-weight: bold; text-decoration: none;
      }
  </style>
</head>
<body>
  <div id="app-loading" style="transition: opacity 0.4s;"><div class="loading-logo">VIORA</div></div>

  <div id="header-root"></div>

  <div class="header-spacing"></div>

  <main class="container py-4" style="max-width: 1200px; min-height: 65vh;">
    
    <h1 class="cart-page-title">Giỏ Hàng Của Bạn</h1>

    <div id="cart-empty" style="display:none; text-align:center; padding: 60px 0;">
      <i class="fa-solid fa-bag-shopping" style="font-size: 60px; color: #ddd; margin-bottom: 20px;"></i>
      <h2 class="premium-font h4 mb-3">Giỏ hàng đang trống</h2>
      <p class="text-muted mb-4">Bạn chưa chọn sản phẩm nào vào giỏ hàng.</p>
      <a href="shop.html" class="btn btn-dark px-5 py-3 rounded-0 fw-bold letter-spacing-1">KHÁM PHÁ NGAY</a>
    </div>

    <div id="cart-content" class="row g-5" style="display:none;">
      
      <div class="col-lg-8">
        <div id="cart-items-container"></div>
      </div>

      <div class="col-lg-4">
        <div class="cart-summary-box sticky-top" style="top: 110px; z-index: 1;">
          <h2 class="summary-title">Tóm Tắt Đơn Hàng</h2>
          
          <div class="summary-row">
            <span>Tổng phụ</span>
            <span class="fw-bold" id="cart-subtotal">0₫</span>
          </div>
          
          <div class="summary-row">
            <span>Phí giao hàng</span>
            <span id="cart-shipping" class="text-muted small">Tính ở bước thanh toán</span>
          </div>

          <div class="summary-row total">
            <span>Tổng cộng</span>
            <span id="cart-total">0₫</span>
          </div>

          <a href="checkout.html" class="btn-checkout text-center text-decoration-none">TIẾN HÀNH THANH TOÁN</a>          
          <div class="text-center mt-4">
            <a href="shop.html" class="small text-muted text-decoration-underline"><i class="fa-solid fa-arrow-left me-1"></i> Tiếp tục mua sắm</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="footer-root"></div>

  <script src="assets/libs/jquery.min.js"></script>
  <script src="assets/libs/bootstrap.bundle.min.js"></script>
  <script src="assets/js/core.js"></script> 
  
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const loader = document.getElementById('app-loading');
      if (loader) setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 400); }, 300);

      if (window.injectLayout) injectLayout();
      if (window.initHeader) initHeader();

      renderCartPage();
    });

    // HÀM FIX ĐƯỜNG DẪN ẢNH
    function fixCartImg(p) {
        if (!p) return "";
        if (p.startsWith('http')) return p;
        let path = p.startsWith('/') ? p.substring(1) : p;
        if (path.startsWith('assets/')) return path;
        return "assets/" + (path.startsWith('images/') ? path : "images/" + path);
    }

    function renderCartPage() {
      let items = [];
      try { items = JSON.parse(localStorage.getItem('viora_cart')) || []; } catch(e) {}

      const emptyState = document.getElementById('cart-empty');
      const contentState = document.getElementById('cart-content');

      if (items.length === 0) {
        if(emptyState) emptyState.style.display = 'block';
        if(contentState) contentState.style.display = 'none';
        if (window.Cart && Cart.updateBadge) Cart.updateBadge();
        return;
      }

      if(emptyState) emptyState.style.display = 'none';
      if(contentState) contentState.style.display = 'flex';

      let html = '';
      let subtotal = 0;

      items.forEach((item, index) => {
        const imgUrl = fixCartImg(item.image);
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;
        const fmtPrice = (typeof formatPrice === 'function') ? formatPrice(item.price) : item.price + '₫';
        const initial = item.name ? item.name.charAt(0).toUpperCase() : 'V';

        html += `
          <div class="cart-row">
            <a href="product-detail.html?id=${item.id}" class="cart-item-img-container">
              <img src="${imgUrl}" alt="${item.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div class="img-fallback" style="display:none;">${initial}</div>
            </a>
            
            <div class="cart-item-info">
              <a href="product-detail.html?id=${item.id}" class="cart-item-name">${item.name}</a>
              <div class="cart-item-meta mt-1">Size: ${item.size || 'Freesize'}</div>
              <div class="mt-2 text-muted small">${fmtPrice}</div>
            </div>

            <div class="cart-qty-control">
              <button class="cart-qty-btn" onclick="updateCartItem(${index}, -1)">−</button>
              <input type="text" class="cart-qty-input" value="${item.qty}" readonly>
              <button class="cart-qty-btn" onclick="updateCartItem(${index}, 1)">+</button>
            </div>

            <div class="cart-item-price">
              ${(typeof formatPrice === 'function') ? formatPrice(itemTotal) : itemTotal + '₫'}
            </div>

            <button class="cart-item-remove" onclick="removeCartItem(${index})" title="Xóa sản phẩm">
              <i class="fa-regular fa-trash-can"></i>
            </button>
          </div>
        `;
      });

      document.getElementById('cart-items-container').innerHTML = html;

      const fmtSubtotal = (typeof formatPrice === 'function') ? formatPrice(subtotal) : subtotal + '₫';
      document.getElementById('cart-subtotal').textContent = fmtSubtotal;
      document.getElementById('cart-total').textContent = fmtSubtotal;

      if (window.Cart && Cart.updateBadge) Cart.updateBadge();
    }

    function updateCartItem(index, delta) {
      let items = JSON.parse(localStorage.getItem('viora_cart')) || [];
      if (items[index]) {
        items[index].qty += delta;
        if (items[index].qty <= 0) items.splice(index, 1);
        localStorage.setItem('viora_cart', JSON.stringify(items));
        renderCartPage(); 
      }
    }

    function removeCartItem(index) {
      let items = JSON.parse(localStorage.getItem('viora_cart')) || [];
      items.splice(index, 1);
      localStorage.setItem('viora_cart', JSON.stringify(items));
      renderCartPage();
    }

    
  </script>
</body>
</html>
